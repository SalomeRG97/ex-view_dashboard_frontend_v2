<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EX-VIEW Solar — Login Admin</title>
  <meta name="description" content="Acceso al configurador de dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css?v=2.51" />
</head>

<body>

  <!-- Background particles -->
  <div class="bg-grid"></div>

  <main class="page-wrapper">

    <!-- Header -->
    <header class="site-header">
      <img src="media/logo-nav.png" alt="EX-VIEW Solar logo"
        style="height:75px;width:auto;object-fit:contain;display:block;flex-shrink:0;" />
      <div>
        <h1 class="site-title">EX-VIEW <span>Solar</span></h1>
        <p class="site-subtitle">Acceso Administrativo</p>
      </div>
    </header>

    <!-- Card -->
    <section class="card" aria-labelledby="form-title">
      <div class="card-header">
        <h2 id="form-title">Iniciar Sesión</h2>
        <p>Ingresa tus credenciales para acceder al configurador.</p>
      </div>

      <form id="loginForm" class="form" novalidate>
        
        <div class="form-group">
          <label for="username">Usuario <span class="required">*</span></label>
          <input id="username" name="username" type="text" placeholder="Ej: admin" required autofocus />
        </div>

        <div class="form-group">
          <label for="password">Contraseña <span class="required">*</span></label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </div>

        <button type="submit" id="submitBtn" class="btn-primary">
          <span class="btn-text">Entrar</span>
        </button>
      </form>
    </section>

    <!-- Error -->
    <div id="errorBanner" class="error-banner" hidden role="alert">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      <span id="errorMessage">Credenciales incorrectas.</span>
    </div>

  </main>

  <script src="js/login.js?v=2.57"></script>
</body>

</html>
