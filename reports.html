<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EX-VIEW Solar — Informes PDF</title>
  <meta name="description" content="Visualiza y genera informes PDF filtrados del dashboard solar."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css?v=2.51"/>
  <style>
    .reports-wrap { max-width: 760px; margin: 0 auto; }

    /* Status badge */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .72rem; font-weight: 700; padding: 3px 10px;
      border-radius: 999px; text-transform: uppercase; letter-spacing: .05em;
    }
    .badge-uploaded  { background: #dbeafe; color: #1d4ed8; }
    .badge-processing{ background: #fef9c3; color: #92400e; }
    .badge-ready     { background: #dcfce7; color: #166534; }
    .badge-failed    { background: #fee2e2; color: #991b1b; }

    /* Report card */
    .report-card {
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      background: var(--clr-surface);
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
    }
    .report-card h3 { font-size: .95rem; font-weight: 700; margin-bottom: .3rem; }
    .report-meta { font-size: .78rem; color: var(--clr-muted); margin-bottom: .9rem; }

    /* Anomaly checklist */
    .anomaly-list { display: flex; flex-direction: column; gap: .45rem; margin-bottom: 1rem; }
    .anomaly-item {
      display: flex; align-items: center; gap: .6rem;
      padding: .55rem .9rem;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .anomaly-item:hover { border-color: var(--clr-amber); background: rgba(245,158,11,.04); }
    .anomaly-item input[type="checkbox"] { accent-color: var(--clr-amber); width: 16px; height: 16px; }
    .anomaly-item label { font-size: .88rem; font-weight: 500; cursor: pointer; }

    /* Progress bar */
    .progress-wrap { margin-top: 1rem; display: none; }
    .progress-bar {
      height: 6px; border-radius: 3px;
      background: var(--clr-surface-2);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #f59e0b, #02152a);
      border-radius: 3px;
      transition: width 0.4s ease;
      animation: progressPulse 1.5s ease-in-out infinite;
    }
    @keyframes progressPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }
    .progress-label { font-size: .78rem; color: var(--clr-muted); margin-top: .4rem; }

    .no-reports { text-align: center; padding: 2rem; color: var(--clr-muted); font-size: .9rem; }

    .action-row { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: .8rem; }

    /* Upload section */
    .upload-section { border-top: 1px solid var(--clr-border); padding-top: 1.2rem; margin-top: 1.2rem; }
    .upload-section h3 { font-size: .88rem; font-weight: 700; margin-bottom: .7rem; color: var(--clr-muted); }
    #pdfFileInput { display: block; font-size: .85rem; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <main class="page-wrapper reports-wrap">

    <header class="site-header">
      <img src="media/logo-nav.png" alt="EX-VIEW Solar logo" style="height:65px;width:auto;object-fit:contain;"/>
      <div>
        <h1 class="site-title">Informes <span>PDF</span></h1>
        <p class="site-subtitle" id="page-subtitle">Cargando...</p>
      </div>
    </header>

    <!-- Navegación -->
    <div style="display:flex;gap:.6rem;">
      <button class="btn-secondary" onclick="history.back()">← Volver</button>
      <button id="btnVerDashboards" class="btn-secondary" onclick="window.location.href='list.html'" hidden>Ver Dashboards</button>
    </div>

    <!-- Contenido principal -->
    <section class="card" id="reports-section">
      <div class="card-header">
        <h2>Informes disponibles</h2>
        <p>Selecciona las anomalías y genera un informe PDF personalizado.</p>
      </div>
      <div style="padding:1.4rem 1.6rem;" id="reports-content">
        <p style="color:var(--clr-muted)">Cargando reportes...</p>
      </div>
    </section>

    <!-- Error Banner -->
    <div id="errorBanner" class="error-banner" hidden role="alert">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorMessage"></span>
    </div>

  </main>
  <script src="js/reports.js?v=1.57"></script>
</body>
</html>
